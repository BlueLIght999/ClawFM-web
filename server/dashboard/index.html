<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Qclaudio 88.7 - Monitoring Dashboard</title>
<style>
/* ==================== CSS Variables ==================== */
:root {
  --bg: #1a1a2e;
  --panel: #222240;
  --panel-light: #2a2a4a;
  --panel-header: #1e1e38;
  --text: #e8e8f0;
  --text-dim: #8a8aaa;
  --text-faint: #5a5a7a;
  --accent: #7c5cff;
  --accent-dim: #4a3a8a;
  --border: #333355;
  --border-light: #3d3d5c;
  --green: #4ade80;
  --yellow: #facc15;
  --red: #f87171;
  --gray: #6b7280;
  --blue: #60a5fa;
  --orange: #fb923c;
  --mono: 'SF Mono', 'Fira Code', 'Cascadia Code', Consolas, 'Courier New', monospace;
}

/* ==================== Reset & Base ==================== */
* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  height: 100%;
  overflow: hidden;
}

body {
  display: flex;
  flex-direction: column;
  background: var(--bg);
  color: var(--text);
  font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
  font-size: 13px;
  line-height: 1.4;
  -webkit-font-smoothing: antialiased;
}

/* ==================== Scrollbar ==================== */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--accent-dim); }

/* ==================== Overview Bar ==================== */
.overview-bar {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  padding: 8px 16px;
  background: var(--panel);
  border-bottom: 1px solid var(--border);
}

.brand {
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
}

.brand-text { display: flex; flex-direction: column; }

.brand-name {
  font-size: 16px;
  font-weight: 700;
  letter-spacing: 0.5px;
  color: var(--accent);
}

.brand-sub {
  font-size: 10px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 1px;
}

.conn-status {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 3px 10px;
  border-radius: 12px;
  font-size: 11px;
  background: var(--panel-light);
  border: 1px solid var(--border);
}

.conn-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--yellow);
  animation: pulse 1.5s infinite;
}

.conn-status.connected .conn-dot { background: var(--green); animation: none; }
.conn-status.disconnected .conn-dot { background: var(--red); animation: none; }
.conn-status.reconnecting .conn-dot { background: var(--yellow); animation: pulse 1s infinite; }

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}

.overview-stats {
  display: flex;
  align-items: center;
  gap: 24px;
  flex-wrap: wrap;
}

.stat-item {
  display: flex;
  flex-direction: column;
  gap: 1px;
  min-width: 0;
}

.stat-label {
  font-size: 10px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.8px;
}

.stat-value {
  font-family: var(--mono);
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 200px;
}

.stat-song .stat-value { max-width: 280px; }

.health-badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 2px 10px;
  border-radius: 10px;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  background: var(--panel-light);
  border: 1px solid var(--border);
  color: var(--text-dim);
}

.health-badge::before {
  content: '';
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--gray);
}

.health-badge.healthy { color: var(--green); border-color: rgba(74,222,128,0.3); }
.health-badge.healthy::before { background: var(--green); }
.health-badge.degraded { color: var(--yellow); border-color: rgba(250,204,21,0.3); }
.health-badge.degraded::before { background: var(--yellow); }
.health-badge.unhealthy { color: var(--red); border-color: rgba(248,113,113,0.3); }
.health-badge.unhealthy::before { background: var(--red); }

/* ==================== Main Grid ==================== */
.main-grid {
  flex: 1;
  display: grid;
  grid-template-columns: 60% 1fr;
  gap: 8px;
  padding: 8px;
  overflow: hidden;
  min-height: 0;
}

/* ==================== Panel Base ==================== */
.panel {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 6px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  min-height: 0;
}

.panel-header {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  padding: 8px 12px;
  background: var(--panel-header);
  border-bottom: 1px solid var(--border);
}

.panel-title {
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-dim);
}

/* ==================== Log Panel ==================== */
.log-panel {
  display: flex;
  flex-direction: column;
  overflow: hidden;
  min-height: 0;
}

.log-controls {
  display: flex;
  align-items: center;
  gap: 8px;
}

.filter-buttons {
  display: flex;
  gap: 2px;
  background: var(--bg);
  border-radius: 4px;
  padding: 2px;
}

.filter-btn {
  padding: 3px 10px;
  border: none;
  background: transparent;
  color: var(--text-dim);
  font-size: 11px;
  font-weight: 500;
  border-radius: 3px;
  cursor: pointer;
  transition: all 0.15s;
  font-family: inherit;
}

.filter-btn:hover { color: var(--text); background: var(--panel-light); }
.filter-btn.active { background: var(--accent); color: #fff; }

.search-box {
  width: 180px;
  padding: 4px 10px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--text);
  font-size: 11px;
  font-family: var(--mono);
  outline: none;
  transition: border-color 0.15s;
}

.search-box:focus { border-color: var(--accent); }
.search-box::placeholder { color: var(--text-faint); }

.log-list {
  flex: 1;
  overflow-y: auto;
  padding: 4px 0;
  font-family: var(--mono);
  font-size: 12px;
}

.log-entry {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  padding: 3px 12px;
  border-bottom: 1px solid rgba(51,51,85,0.3);
  cursor: default;
  transition: background 0.1s;
  animation: logFadeIn 0.2s ease-out;
}

@keyframes logFadeIn {
  from { opacity: 0; transform: translateY(-2px); }
  to { opacity: 1; transform: translateY(0); }
}

.log-entry:hover { background: var(--panel-light); }
.log-entry.hidden { display: none; }

.log-time {
  color: var(--text-faint);
  font-size: 11px;
  white-space: nowrap;
  flex-shrink: 0;
  padding-top: 1px;
}

.log-level-badge {
  font-size: 9px;
  font-weight: 700;
  text-transform: uppercase;
  padding: 1px 6px;
  border-radius: 3px;
  flex-shrink: 0;
  min-width: 38px;
  text-align: center;
}

.log-level-badge.debug { background: rgba(107,114,128,0.2); color: var(--gray); }
.log-level-badge.info { background: rgba(96,165,250,0.2); color: var(--blue); }
.log-level-badge.warn { background: rgba(250,204,21,0.2); color: var(--yellow); }
.log-level-badge.error { background: rgba(248,113,113,0.2); color: var(--red); }

.log-msg {
  flex: 1;
  min-width: 0;
  word-break: break-word;
  color: var(--text);
  padding-top: 1px;
}

.log-trace {
  color: var(--text-faint);
  font-size: 10px;
  flex-shrink: 0;
  padding-top: 2px;
  max-width: 80px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.log-data-toggle {
  color: var(--accent);
  font-size: 10px;
  cursor: pointer;
  flex-shrink: 0;
  padding-top: 1px;
  user-select: none;
}

.log-data-toggle:hover { color: var(--text); }

.log-data {
  display: none;
  margin: 4px 0 4px 54px;
  padding: 6px 10px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 4px;
  font-size: 11px;
  color: var(--text-dim);
  overflow-x: auto;
  white-space: pre-wrap;
  word-break: break-all;
  max-height: 300px;
  overflow-y: auto;
}

.log-data.expanded { display: block; }

.log-empty {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100%;
  color: var(--text-faint);
  font-size: 13px;
}

/* ==================== Right Column ==================== */
.right-column {
  display: flex;
  flex-direction: column;
  gap: 8px;
  overflow: hidden;
  min-height: 0;
}

/* ==================== Metrics Panel ==================== */
.metrics-panel {
  flex: 0 1 58%;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  min-height: 0;
}

.metrics-grid {
  flex: 1;
  overflow-y: auto;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
  padding: 8px;
}

.metric-card {
  background: var(--panel-light);
  border: 1px solid var(--border);
  border-radius: 5px;
  padding: 8px 10px;
  display: flex;
  flex-direction: column;
  gap: 4px;
  transition: border-color 0.15s;
}

.metric-card:hover { border-color: var(--border-light); }

.metric-label {
  font-size: 10px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.metric-value {
  font-family: var(--mono);
  font-size: 20px;
  font-weight: 700;
  color: var(--text);
  line-height: 1.2;
}

.metric-value.dim { color: var(--text-faint); }

.metric-sparkline {
  height: 24px;
  width: 100%;
}

.metric-sparkline svg {
  width: 100%;
  height: 100%;
  display: block;
}

/* ==================== Timeline Panel ==================== */
.timeline-panel {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  min-height: 0;
}

.timeline-list {
  flex: 1;
  overflow-y: auto;
  padding: 8px 12px;
  position: relative;
}

.timeline-list::before {
  content: '';
  position: absolute;
  left: 20px;
  top: 8px;
  bottom: 8px;
  width: 2px;
  background: var(--border);
}

.timeline-item {
  display: flex;
  gap: 12px;
  padding: 4px 0;
  position: relative;
  animation: timelineSlideIn 0.25s ease-out;
}

@keyframes timelineSlideIn {
  from { opacity: 0; transform: translateX(-8px); }
  to { opacity: 1; transform: translateX(0); }
}

.timeline-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
  margin-top: 3px;
  margin-left: 4px;
  z-index: 1;
  border: 2px solid var(--panel);
  box-shadow: 0 0 0 1px var(--border);
}

.timeline-content {
  flex: 1;
  min-width: 0;
}

.timeline-message {
  font-size: 12px;
  color: var(--text);
  word-break: break-word;
}

.timeline-meta {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-top: 1px;
}

.timeline-type {
  font-size: 9px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  padding: 1px 5px;
  border-radius: 3px;
}

.timeline-time {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text-faint);
}

.timeline-empty {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100%;
  color: var(--text-faint);
  font-size: 13px;
}

/* ==================== Health Panel ==================== */
.health-panel {
  flex-shrink: 0;
  background: var(--panel);
  border-top: 1px solid var(--border);
}

.health-panel .panel-header { border-bottom: 1px solid var(--border); }

.health-checks {
  display: flex;
  gap: 8px;
  padding: 8px 12px;
  flex-wrap: wrap;
}

.health-check-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 12px;
  background: var(--panel-light);
  border: 1px solid var(--border);
  border-radius: 5px;
  min-width: 140px;
}

.health-indicator {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
  background: var(--gray);
  transition: background 0.2s, box-shadow 0.2s;
}

.health-indicator.up { background: var(--green); box-shadow: 0 0 6px rgba(74,222,128,0.4); }
.health-indicator.degraded { background: var(--yellow); box-shadow: 0 0 6px rgba(250,204,21,0.4); }
.health-indicator.down { background: var(--red); box-shadow: 0 0 6px rgba(248,113,113,0.4); }

.health-info { display: flex; flex-direction: column; gap: 1px; }

.health-name {
  font-size: 12px;
  font-weight: 600;
  color: var(--text);
}

.health-latency {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text-dim);
}

.health-status-text {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.health-status-text.up { color: var(--green); }
.health-status-text.degraded { color: var(--yellow); }
.health-status-text.down { color: var(--red); }
.health-status-text.unknown { color: var(--text-dim); }

/* ==================== Responsive ==================== */
@media (max-width: 1280px) {
  .main-grid { grid-template-columns: 55% 1fr; }
  .overview-stats { gap: 16px; }
  .stat-song .stat-value { max-width: 180px; }
}

@media (max-width: 1024px) {
  .main-grid {
    grid-template-columns: 1fr;
    grid-template-rows: auto auto;
  }
  .log-panel { max-height: 50vh; }
  .metrics-panel { flex: 0 0 auto; max-height: none; }
  .metrics-grid { max-height: 300px; }
  .overview-stats { gap: 12px; }
  .search-box { width: 120px; }
}

@media (max-width: 768px) {
  body { font-size: 12px; }
  .overview-bar { flex-direction: column; align-items: stretch; gap: 8px; padding: 8px; }
  .overview-stats { justify-content: space-between; gap: 8px; }
  .stat-value { font-size: 12px; }
  .stat-song .stat-value { max-width: 120px; }
  .metrics-grid { grid-template-columns: 1fr; }
  .health-checks { flex-direction: column; }
  .health-check-item { min-width: 0; }
  .filter-buttons { flex-wrap: wrap; }
  .search-box { width: 100%; }
  .log-controls { flex-direction: column; align-items: stretch; gap: 4px; }
}
</style>
</head>
<body>

<!-- ==================== Overview Bar ==================== -->
<header class="overview-bar">
  <div class="brand">
    <div class="brand-text">
      <span class="brand-name">Qclaudio 88.7</span>
      <span class="brand-sub" data-i18n="monitoringDashboard">Monitoring Dashboard</span>
    </div>
    <div class="conn-status reconnecting" id="connStatus">
      <span class="conn-dot"></span>
      <span class="conn-text" data-i18n="connecting">Connecting...</span>
    </div>
  </div>
  <div class="overview-stats">
    <div class="stat-item">
      <span class="stat-label" data-i18n="uptime">Uptime</span>
      <span class="stat-value" id="statUptime">--</span>
    </div>
    <div class="stat-item">
      <span class="stat-label" data-i18n="clients">Clients</span>
      <span class="stat-value" id="statClients">--</span>
    </div>
    <div class="stat-item">
      <span class="stat-label" data-i18n="queue">Queue</span>
      <span class="stat-value" id="statQueue">--</span>
    </div>
    <div class="stat-item stat-song">
      <span class="stat-label" data-i18n="nowPlaying">Now Playing</span>
      <span class="stat-value" id="statSong">--</span>
    </div>
    <div class="stat-item">
      <span class="stat-label" data-i18n="health">Health</span>
      <span class="health-badge" id="statHealth" data-i18n="unknown">Unknown</span>
    </div>
    <button id="langToggle" onclick="toggleLang()" style="padding:3px 10px;border-radius:4px;background:var(--panel-light);border:1px solid var(--border);color:var(--text);font-size:11px;cursor:pointer;font-weight:600;">中 / EN</button>
    <a href="/dashboard/profile" target="_blank" data-i18n="profilePanel" style="padding:3px 10px;border-radius:4px;background:var(--accent);color:#fff;font-size:11px;font-weight:600;text-decoration:none;white-space:nowrap;">Profile Panel →</a>
  </div>
</header>

<!-- ==================== Main Grid ==================== -->
<main class="main-grid">

  <!-- Log Stream -->
  <section class="panel log-panel">
    <div class="panel-header">
      <h2 class="panel-title" data-i18n="logStream">Log Stream</h2>
      <div class="log-controls">
        <div class="filter-buttons">
          <button class="filter-btn active" data-level="all" data-i18n="all">All</button>
          <button class="filter-btn" data-level="debug" data-i18n="debug">Debug</button>
          <button class="filter-btn" data-level="info" data-i18n="info">Info</button>
          <button class="filter-btn" data-level="warn" data-i18n="warn">Warn</button>
          <button class="filter-btn" data-level="error" data-i18n="error">Error</button>
        </div>
        <input type="text" class="search-box" id="logSearch" placeholder="Search logs..." data-i18n-placeholder="searchLogs">
      </div>
    </div>
    <div class="log-list" id="logList">
      <div class="log-empty" id="logEmpty" data-i18n="waitingForConnection">Waiting for connection...</div>
    </div>
  </section>

  <!-- Right Column -->
  <div class="right-column">

    <!-- Metrics -->
    <section class="panel metrics-panel">
      <div class="panel-header">
        <h2 class="panel-title" data-i18n="metrics">Metrics</h2>
      </div>
      <div class="metrics-grid" id="metricsGrid"></div>
    </section>

    <!-- Timeline -->
    <section class="panel timeline-panel">
      <div class="panel-header">
        <h2 class="panel-title" data-i18n="eventTimeline">Event Timeline</h2>
      </div>
      <div class="timeline-list" id="timelineList">
        <div class="timeline-empty" id="timelineEmpty" data-i18n="noEventsYet">No events yet</div>
      </div>
    </section>

  </div>
</main>

<!-- ==================== Health Panel ==================== -->
<footer class="panel health-panel">
  <div class="panel-header">
    <h2 class="panel-title" data-i18n="healthChecks">Health Checks</h2>
  </div>
  <div class="health-checks" id="healthChecks"></div>
</footer>

<script src="https://cdn.socket.io/4.8.0/socket.io.min.js"></script>

/* ==================== Utility Functions ==================== */

function escapeHtml(text) {
  if (text == null) return '';
  var div = document.createElement('div');
  div.textContent = String(text);
  return div.innerHTML;
}

function formatTime(timestamp) {
  if (!timestamp) return '--:--:--';
  var d;
  if (typeof timestamp === 'number') {
    d = new Date(timestamp > 1e12 ? timestamp : timestamp * 1000);
  } else if (typeof timestamp === 'string') {
    d = new Date(timestamp);
  } else {
    d = new Date();
  }
  if (isNaN(d.getTime())) d = new Date();
  var h = String(d.getHours()).padStart(2, '0');
  var m = String(d.getMinutes()).padStart(2, '0');
  var s = String(d.getSeconds()).padStart(2, '0');
  var ms = String(d.getMilliseconds()).padStart(3, '0');
  return h + ':' + m + ':' + s + '.' + ms;
}

function formatTimeShort(timestamp) {
  if (!timestamp) return '';
  var d;
  if (typeof timestamp === 'number') {
    d = new Date(timestamp > 1e12 ? timestamp : timestamp * 1000);
  } else if (typeof timestamp === 'string') {
    d = new Date(timestamp);
  } else {
    d = new Date();
  }
  if (isNaN(d.getTime())) d = new Date();
  var h = String(d.getHours()).padStart(2, '0');
  var m = String(d.getMinutes()).padStart(2, '0');
  var s = String(d.getSeconds()).padStart(2, '0');
  return h + ':' + m + ':' + s;
}

function formatUptime(seconds) {
  if (seconds == null || isNaN(seconds)) return '--';
  var s = Math.floor(seconds);
  var d = Math.floor(s / 86400);
  var h = Math.floor((s % 86400) / 3600);
  var m = Math.floor((s % 3600) / 60);
  var sec = s % 60;
  if (d > 0) return d + 'd ' + h + 'h ' + m + 'm';
  if (h > 0) return h + 'h ' + m + 'm ' + sec + 's';
  if (m > 0) return m + 'm ' + sec + 's';
  return sec + 's';
}

function formatLogData(data) {
  if (data == null) return null;
  if (typeof data === 'string') return data;
  try {
    return JSON.stringify(data, null, 2);
  } catch (e) {
    return String(data);
  }
}

function isScrolledToBottom(el) {
  return el.scrollHeight - el.scrollTop - el.clientHeight < 40;
}

function scrollToBottom(el) {
  el.scrollTop = el.scrollHeight;

/* ==================== Sparkline Generation ==================== */

function createSparkline(data, width, height, color) {
  var w = width || 100;
  var h = height || 24;
  var c = color || '#7c5cff';

  if (!data || data.length === 0) {
    return '<svg viewBox="0 0 ' + w + ' ' + h + '" preserveAspectRatio="none"></svg>';
  }

  if (data.length === 1) {
    var cy = h / 2;
    var cx = w / 2;
    return '<svg viewBox="0 0 ' + w + ' ' + h + '" preserveAspectRatio="none">' +
      '<circle cx="' + cx + '" cy="' + cy + '" r="2" fill="' + c + '" />' +
      '</svg>';
  }

  var max = Math.max.apply(null, data);
  var min = Math.min.apply(null, data);
  var range = max - min;
  var safeRange = range === 0 ? 1 : range;
  var step = w / (data.length - 1);
  var pad = 3;
  var usableH = h - pad * 2;

  var pts = [];
  for (var i = 0; i < data.length; i++) {
    var x = (i * step).toFixed(1);
    var y = (pad + usableH - ((data[i] - min) / safeRange) * usableH).toFixed(1);
    pts.push(x + ',' + y);
  }

  var linePts = pts.join(' ');
  var areaPts = '0,' + h + ' ' + linePts + ' ' + w + ',' + h;

  return '<svg viewBox="0 0 ' + w + ' ' + h + '" preserveAspectRatio="none">' +
    '<polyline points="' + areaPts + '" fill="' + c + '" fill-opacity="0.12" stroke="none" />' +
    '<polyline points="' + linePts + '" fill="none" stroke="' + c + '" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" />' +
    '</svg>';
}

/* ==================== Metric Value Extraction ==================== */

function getMetricValue(metrics, def) {
  var source;
  if (def.cat === 'counter') source = metrics.counters || {};
  else if (def.cat === 'gauge') source = metrics.gauges || {};
  else if (def.cat === 'runtime') source = metrics.runtime || {};
  else return undefined;

  if (def.keys) {
    for (var i = 0; i < def.keys.length; i++) {
      var k = def.keys[i];
      if (source[k] !== undefined && source[k] !== null) {
        return source[k];
      }
    }
    return undefined;
  }
  return source[def.key];
}

/* ==================== Log Stream ==================== */

function addLogEntry(log) {
  // Remove empty placeholder
  if (logEmpty) logEmpty.style.display = 'none';

  logs.push(log);
  if (logs.length > MAX_LOGS) {
    var removed = logs.shift();
    var removedEl = document.getElementById('log-' + removed._id);
    if (removedEl) removedEl.remove();
  }

  var wasAtBottom = isScrolledToBottom(logList);
  var el = renderLogEntry(log);
  logList.appendChild(el);

  // Apply current filter
  if (!matchesFilter(log)) {
    el.classList.add('hidden');
  }

  if (wasAtBottom) {
    scrollToBottom(logList);
  }
}

var logIdCounter = 0;

function renderLogEntry(log) {
  log._id = log._id || (++logIdCounter);
  var level = (log.level || 'info').toLowerCase();
  var time = formatTime(log.timestamp);
  var msg = escapeHtml(log.msg || log.message || '');
  var dataStr = formatLogData(log.data);
  var traceId = log.traceId || log.trace_id || '';

  var div = document.createElement('div');
  div.className = 'log-entry level-' + level;
  div.id = 'log-' + log._id;
  div.setAttribute('data-level', level);

  var html = '<span class="log-time">' + escapeHtml(time) + '</span>';
  html += '<span class="log-level-badge ' + level + '">' + escapeHtml(level) + '</span>';
  html += '<span class="log-msg">' + msg + '</span>';

  if (traceId) {
    html += '<span class="log-trace" title="' + escapeHtml(traceId) + '">#' + escapeHtml(traceId.substring(0, 8)) + '</span>';
  }

  if (dataStr) {
    html += '<span class="log-data-toggle" data-expanded="false">[+]</span>';
    html += '<pre class="log-data">' + escapeHtml(dataStr) + '</pre>';
  }

  div.innerHTML = html;

  // Wire up data toggle
  if (dataStr) {
    var toggle = div.querySelector('.log-data-toggle');
    var dataEl = div.querySelector('.log-data');
    if (toggle && dataEl) {
      toggle.addEventListener('click', function(e) {
        e.stopPropagation();
        var expanded = toggle.getAttribute('data-expanded') === 'true';
        if (expanded) {
          dataEl.classList.remove('expanded');
          toggle.textContent = '[+]';
          toggle.setAttribute('data-expanded', 'false');
        } else {
          dataEl.classList.add('expanded');
          toggle.textContent = '[-]';
          toggle.setAttribute('data-expanded', 'true');
        }
      });
    }
  }

  return div;
}

function matchesFilter(log) {
  var level = (log.level || 'info').toLowerCase();
  if (currentFilter !== 'all' && level !== currentFilter) {
    return false;
  }
  if (searchQuery) {
    var msg = (log.msg || log.message || '').toLowerCase();
    var dataStr = '';
    try { dataStr = JSON.stringify(log.data || '').toLowerCase(); } catch(e) {}
    if (msg.indexOf(searchQuery) === -1 && dataStr.indexOf(searchQuery) === -1) {
      return false;
    }
  }
  return true;
}

function applyLogFilters() {
  var entries = logList.querySelectorAll('.log-entry');
  var visibleCount = 0;
  for (var i = 0; i < entries.length; i++) {
    var el = entries[i];
    var level = el.getAttribute('data-level');
    var msgEl = el.querySelector('.log-msg');
    var msg = msgEl ? msgEl.textContent.toLowerCase() : '';
    var dataEl = el.querySelector('.log-data');
    var dataStr = dataEl ? dataEl.textContent.toLowerCase() : '';

    var levelMatch = (currentFilter === 'all' || level === currentFilter);
    var searchMatch = (!searchQuery || msg.indexOf(searchQuery) !== -1 || dataStr.indexOf(searchQuery) !== -1);

    if (levelMatch && searchMatch) {
      el.classList.remove('hidden');
      visibleCount++;
    } else {
      el.classList.add('hidden');
    }
  }

  if (visibleCount === 0 && logs.length > 0) {
    if (logEmpty) {
      logEmpty.textContent = tr('noLogsMatch');
      logEmpty.style.display = 'flex';
    }
  } else {
    if (logEmpty) logEmpty.style.display = 'none';
  }
}

  logList.innerHTML = '<div class="log-empty" id="logEmpty">' + tr('waitingForLogs') + '</div>';

function updateMetric(id, value) {
  var card = metricCards[id];
  if (!card) return;

  // Update value display
  var displayVal = value;
  if (typeof value === 'number') {
    if (value >= 1000000) displayVal = (value / 1000000).toFixed(2) + 'M';
    else if (value >= 10000) displayVal = (value / 1000).toFixed(1) + 'k';
    else if (Number.isInteger(value)) displayVal = value.toString();
    else displayVal = value.toFixed(2);
  }
  card.valueEl.textContent = displayVal;
  card.valueEl.classList.remove('dim');

  // Update history
  if (!metricsHistory[id]) metricsHistory[id] = [];
  metricsHistory[id].push(value);
  if (metricsHistory[id].length > MAX_SPARKLINE_POINTS) {
    metricsHistory[id].shift();
  }

  // Update sparkline
  card.sparkEl.innerHTML = createSparkline(metricsHistory[id], 100, 24, card.def.color);
}

function updateMetrics(data) {
  if (!data) return;

  for (var i = 0; i < metricDefs.length; i++) {
    var def = metricDefs[i];
    var value = getMetricValue(data, def);
    if (value !== undefined && value !== null) {
      updateMetric(def.id, value);
    }
  }

  // Update overview stats from gauges
  var gauges = data.gauges || {};
  if (gauges.queueSize !== undefined && gauges.queueSize !== null) {
    statQueue.textContent = gauges.queueSize;
  }
  if (gauges.connectedClients !== undefined && gauges.connectedClients !== null) {
    statClients.textContent = gauges.connectedClients;
  }

  // Runtime uptime
  var runtime = data.runtime || {};
  if (runtime.uptime !== undefined && runtime.uptime !== null) {
    statUptime.textContent = formatUptime(runtime.uptime);
  }
}

function updateHealth(data) {
  if (!data) return;
  healthData = data;

  // Overall health badge
  var status = (data.status || 'unknown').toLowerCase();
  var badgeClass = 'health-badge';
  var badgeText = tr('unknown');
  if (status === 'healthy' || status === 'ok' || status === 'up') {
    badgeClass += ' healthy';
    badgeText = tr('healthy');
  } else if (status === 'degraded' || status === 'warning') {
    badgeClass += ' degraded';
    badgeText = tr('degraded');
  } else if (status === 'unhealthy' || status === 'down' || status === 'error') {
    badgeClass += ' unhealthy';
    badgeText = tr('unhealthy');
  }
  statHealth.className = badgeClass;
  statHealth.textContent = badgeText;

  // Uptime
  if (data.uptime !== undefined && data.uptime !== null) {
    statUptime.textContent = formatUptime(data.uptime);
  }

  // Individual checks
  var checks = data.checks || {};
  for (var i = 0; i < healthCheckDefs.length; i++) {
    var def = healthCheckDefs[i];
    var check = checks[def.id] || checks[def.id.toLowerCase()] || checks[def.id.toUpperCase()];
    var item = document.getElementById('health-' + def.id);
    if (!item) continue;

    var indicator = item.querySelector('.health-indicator');
    var latencyEl = item.querySelector('.health-latency');

    if (!check) {
      indicator.className = 'health-indicator';
      latencyEl.textContent = 'N/A';
      continue;
    }

    var checkStatus = (check.status || 'unknown').toLowerCase();
    var indicatorClass = 'health-indicator';
    var statusText = '';

    if (checkStatus === 'up' || checkStatus === 'healthy' || checkStatus === 'ok') {
      indicatorClass += ' up';
      statusText = tr('up');
    } else if (checkStatus === 'degraded' || checkStatus === 'warning' || checkStatus === 'slow') {
      indicatorClass += ' degraded';
      statusText = tr('degraded');
    } else if (checkStatus === 'down' || checkStatus === 'unhealthy' || checkStatus === 'error' || checkStatus === 'fail') {
      indicatorClass += ' down';
      statusText = tr('down');
    } else {
      statusText = tr('unknown');
    }

    indicator.className = indicatorClass;

    var latency = check.latency;
    if (latency !== undefined && latency !== null) {
      latencyEl.textContent = statusText + ' - ' + Math.round(latency) + 'ms';
    } else {
      latencyEl.textContent = statusText;
    }
  }
}

function addEvent(event) {
  if (timelineEmpty) timelineEmpty.style.display = 'none';

  events.unshift(event);
  if (events.length > MAX_EVENTS) {
    events.pop();
  }
  renderTimeline();
}

function renderTimeline() {
  if (events.length === 0) {
    timelineList.innerHTML = '<div class="timeline-empty" id="timelineEmpty">' + tr('noEventsYet') + '</div>';
    timelineEmpty = document.getElementById('timelineEmpty');
    return;
  }

  timelineList.innerHTML = '';
  for (var i = 0; i < events.length; i++) {
    var ev = events[i];
    var typeDef = getEventTypeDef(ev.type);
    var msg = escapeHtml(ev.message || ev.msg || '');
    var time = formatTimeShort(ev.timestamp);

    var item = document.createElement('div');
    item.className = 'timeline-item';
    item.innerHTML =
      '<div class="timeline-dot" style="background:' + typeDef.color + '"></div>' +
      '<div class="timeline-content">' +
        '<div class="timeline-message">' + msg + '</div>' +
        '<div class="timeline-meta">' +
          '<span class="timeline-type" style="background:' + typeDef.color + '22;color:' + typeDef.color + '">' + escapeHtml(tr(typeDef.label)) + '</span>' +
          '<span class="timeline-time">' + escapeHtml(time) + '</span>' +
        '</div>' +
      '</div>';
    timelineList.appendChild(item);
  }
}

/* ==================== Current Song ==================== */

function updateCurrentSong(song) {
  currentSong = song;
  if (!song) {
    statSong.textContent = '--';
    return;
  }
  var title = song.title || song.name || song.songName || '';
  var artist = song.artist || song.singer || '';
  if (title && artist) {
    statSong.textContent = artist + ' - ' + title;
  } else if (title) {
    statSong.textContent = title;
  } else {
    statSong.textContent = '--';
  }
}

/* ==================== Full State Handler ==================== */

function handleFullState(data) {
  // Clear and rebuild logs
  logs = [];
  logList.innerHTML = '';

  var fullLogs = data.logs || [];
  for (var i = 0; i < fullLogs.length && i < MAX_LOGS; i++) {
    var log = fullLogs[i];
    log._id = ++logIdCounter;
    logs.push(log);
    var el = renderLogEntry(log);
    logList.appendChild(el);
    if (!matchesFilter(log)) {
      el.classList.add('hidden');
    }
  }

  if (logs.length === 0) {
    logList.innerHTML = '<div class="log-empty" id="logEmpty">' + tr('noLogsYet') + '</div>';
    logEmpty = document.getElementById('logEmpty');
  } else {
    logEmpty = null;
    scrollToBottom(logList);
  }

  // Update metrics
  if (data.metrics) {
    // Reset history on full state
    metricsHistory = {};
    updateMetrics(data.metrics);
  }

  // Update health
  if (data.health) {
    updateHealth(data.health);
  }

  // Update events
  events = [];
  var fullEvents = data.events || [];
  for (var j = 0; j < fullEvents.length && j < MAX_EVENTS; j++) {
    events.push(fullEvents[j]);
  }
  renderTimeline();

  // Update current song
  if (data.currentSong) {
    updateCurrentSong(data.currentSong);
  }
}

/* ==================== Socket.IO Connection ==================== */

function connectSocket() {
  socket = io('/dashboard', {
    transports: ['websocket', 'polling'],
    reconnection: true,
    reconnectionDelay: 1000,
    reconnectionDelayMax: 5000,
    reconnectionAttempts: Infinity
  });

  socket.on('connect', function() {
    setConnStatus('connected', tr('connected'));
  });

  socket.on('disconnect', function() {
    setConnStatus('disconnected', tr('disconnected'));
  });

  socket.on('connect_error', function() {
    setConnStatus('disconnected', tr('connectionError'));
  });

  socket.on('reconnect_attempt', function() {
    setConnStatus('reconnecting', tr('reconnecting'));
  });

  socket.on('reconnect', function() {
    setConnStatus('connected', tr('connected'));
  });

  // Dashboard events
  socket.on('dashboard:full', function(data) {
    handleFullState(data);
  });

  socket.on('dashboard:log', function(log) {
    addLogEntry(log);
  });

  socket.on('dashboard:metrics', function(data) {
    updateMetrics(data);
  });

  socket.on('dashboard:health', function(data) {
    updateHealth(data);
  });

  socket.on('dashboard:event', function(event) {
    addEvent(event);
  });
}

/* ==================== Event Listeners ==================== */

function setupEventListeners() {
  // Filter buttons
  var filterBtns = document.querySelectorAll('.filter-btn');
  for (var i = 0; i < filterBtns.length; i++) {
    filterBtns[i].addEventListener('click', function() {
      for (var j = 0; j < filterBtns.length; j++) {
        filterBtns[j].classList.remove('active');
      }
      this.classList.add('active');
      currentFilter = this.getAttribute('data-level');
      applyLogFilters();
    });
  }

  // Search box
  var searchTimer = null;
  logSearch.addEventListener('input', function() {
    var val = logSearch.value.trim().toLowerCase();
    if (searchTimer) clearTimeout(searchTimer);
    searchTimer = setTimeout(function() {
      searchQuery = val;
      applyLogFilters();
    }, 150);
  });

  // Auto-scroll on click (click anywhere in log list to jump to bottom)
  logList.addEventListener('dblclick', function() {
    scrollToBottom(logList);
  });
}

/* ==================== Initialization ==================== */

function init() {
  applyLang();
  initMetricCards();
  initHealthChecks();
  setupEventListeners();
  connectSocket();
}

// Start when DOM is ready
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}

})();
</script>
